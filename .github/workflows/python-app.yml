name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run syntax checks
        run: |
          python -m py_compile main.py dashboard.py data/fetcher.py analysis/indicators.py analysis/visualization.py models/forecast.py utils/file_io.py
      - name: Verify package imports
        run: |
          python -c "import pandas, numpy, matplotlib, yfinance, streamlit, plotly; print('imports ok')"
